version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: latihandulu-web
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=backend/data.db
